<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード生成</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4 py-8">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">QRコード生成</h1>

    <div class="bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 mb-4 text-sm text-blue-800">
      <p>このツールはブラウザ上でQRコードを生成します。入力データは外部サーバーに送信されません。</p>
      <p class="mt-1"><a href="https://github.com/gghatano/qr-generator" target="_blank" rel="noopener noreferrer" class="underline font-medium hover:text-blue-600">ソースコードはGitHubで公開中</a></p>
    </div>

    <div class="space-y-5">
      <!-- テキスト入力 -->
      <div>
        <label for="text" class="block text-sm font-medium text-gray-700 mb-1">URLまたはテキスト</label>
        <input
          type="text"
          id="text"
          placeholder="https://example.com"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
        >
      </div>

      <!-- サイズスライダー -->
      <div>
        <label for="size" class="block text-sm font-medium text-gray-700 mb-1">
          サイズ: <span id="sizeValue" class="font-semibold text-blue-600">10</span>
        </label>
        <input
          type="range"
          id="size"
          min="5"
          max="20"
          value="10"
          class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
        >
        <div class="flex justify-between text-xs text-gray-400 mt-1">
          <span>5</span>
          <span>20</span>
        </div>
      </div>

      <!-- 生成ボタン -->
      <button
        id="generateBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition"
      >
        生成
      </button>

      <!-- プレビューエリア -->
      <div id="previewArea" class="hidden text-center space-y-4">
        <div class="border border-gray-200 rounded-lg p-4 bg-gray-50 inline-block mx-auto">
          <canvas id="qrCanvas" class="mx-auto"></canvas>
        </div>
        <a
          id="downloadBtn"
          download="qrcode.png"
          class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-lg transition cursor-pointer"
        >
          ダウンロード
        </a>
      </div>
    </div>
  </div>

  <script>
    const textInput = document.getElementById('text');
    const sizeSlider = document.getElementById('size');
    const sizeValue = document.getElementById('sizeValue');
    const generateBtn = document.getElementById('generateBtn');
    const previewArea = document.getElementById('previewArea');
    const qrCanvas = document.getElementById('qrCanvas');
    const downloadBtn = document.getElementById('downloadBtn');

    sizeSlider.addEventListener('input', () => {
      sizeValue.textContent = sizeSlider.value;
    });

    generateBtn.addEventListener('click', () => {
      const text = textInput.value.trim();
      if (!text) {
        alert('URLまたはテキストを入力してください。');
        return;
      }

      const cellSize = parseInt(sizeSlider.value, 10);
      const margin = 4;

      // QRコード生成（タイプ0=自動判定、エラー訂正レベルM）
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();

      const moduleCount = qr.getModuleCount();
      const totalSize = (moduleCount + margin * 2) * cellSize;

      qrCanvas.width = totalSize;
      qrCanvas.height = totalSize;
      const ctx = qrCanvas.getContext('2d');

      // 背景を白で塗りつぶし
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, totalSize, totalSize);

      // QRコードを描画
      ctx.fillStyle = '#000000';
      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillRect(
              (col + margin) * cellSize,
              (row + margin) * cellSize,
              cellSize,
              cellSize
            );
          }
        }
      }

      // ダウンロードリンクを設定
      downloadBtn.href = qrCanvas.toDataURL('image/png');
      previewArea.classList.remove('hidden');
    });
  </script>
</body>
</html>
